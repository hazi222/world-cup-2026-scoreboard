<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2840"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <!-- Inverts black paths → white so the logo is visible on dark bg -->
    <filter id="inv" color-interpolation-filters="sRGB">
      <feComponentTransfer>
        <feFuncR type="linear" slope="-1" intercept="1"/>
        <feFuncG type="linear" slope="-1" intercept="1"/>
        <feFuncB type="linear" slope="-1" intercept="1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle glow behind the logo -->
  <ellipse cx="256" cy="195" rx="155" ry="195" fill="#38bdf8" opacity="0.05"/>

  <!-- Official FIFA World Cup 2026 emblem (inverted to white for dark bg) -->
  <image
    href="https://upload.wikimedia.org/wikipedia/en/1/17/2026_FIFA_World_Cup_emblem.svg"
    xlink:href="https://upload.wikimedia.org/wikipedia/en/1/17/2026_FIFA_World_Cup_emblem.svg"
    x="141" y="12" width="230" height="355"
    filter="url(#inv)"/>

  <!-- Gradient divider -->
  <rect x="56" y="382" width="400" height="2.5" rx="1.25" fill="url(#grad)"/>

  <!-- App name in accent gradient -->
  <text x="256" y="440"
    font-family="'Arial Black',Arial,Helvetica,sans-serif"
    font-size="38" font-weight="900"
    text-anchor="middle"
    fill="url(#grad)"
    letter-spacing="3">SCOREBOARD</text>

  <!-- Host nations subtitle -->
  <text x="256" y="476"
    font-family="Arial,Helvetica,sans-serif"
    font-size="19" font-weight="600"
    text-anchor="middle"
    fill="#64748b"
    letter-spacing="2">USA • CAN • MEX</text>
</svg>
