<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>World Cup 2026 Scoreboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css?v=13">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="theme-color" content="#0b121a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WC 2026">
</head>
<body>
    <div id="user-profile-badge"></div>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="https://carboncredits.com/wp-content/uploads/2025/09/shutterstock_2306088965-e1757112807302-1536x1078.jpg" alt="World Cup Image" class="main-logo">
            </div>
            <h1>World Cup 2026 Scoreboard</h1>
            <div class="tabs-container">
                <button class="tab-btn active" onclick="switchTab('scoreboard', this)">📊 Scoreboard</button>
                <button class="tab-btn" onclick="switchTab('today', this)">Today's Picks</button>
                <button class="tab-btn" onclick="switchTab('predictions', this)">All Picks</button>
                <button class="tab-btn" onclick="switchTab('bracket', this)">🏆 Bracket</button>
            </div>
        </header>
        
        <article>
            <div id="scoreboard-section" class="tab-content active">
            <div class="live-scores-container">
                <div class="live-scores-header">
                    <h2>Today's Matches</h2>
                    <span class="live-indicator"></span>
                </div>
                <div id="live-matches-list" class="matches-list">
                    <!-- Live match cards will be injected here -->
                </div>
            </div>

            <div class="table-container">
                <table id="myTable">
                    <thead>
                        <tr>
                            <th style="text-align: left; padding-left: 60px;">Team</th>
                            <th>W</th>
                            <th>D</th>
                            <th>L</th>
                            <th class="sortable" onclick="sortTable()">Team Pts <span>⇅</span></th>
                            <th>Form</th>
                        </tr>
                    </thead>
                    <tbody id="scoreboard-body"></tbody>
                </table>
            </div>

            <div class="live-scores-container" style="margin-top: 20px;">
                <h2 style="font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;">Score Predictions</h2>
                <div class="table-container">
                    <table id="predTable">
                        <thead>
                            <tr>
                                <th style="text-align: left; padding-left: 10px;">Player</th>
                                <th>Pred Pts</th>
                                <th>Accuracy</th>
                            </tr>
                        </thead>
                        <tbody id="pred-leaderboard-body"></tbody>
                    </table>
                </div>
            </div>

            <div class="live-scores-container" style="margin-top: 20px;">
                <h2 style="font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;">Grand Total</h2>
                <div class="table-container">
                    <table id="grandTable">
                        <thead>
                            <tr>
                                <th style="text-align: left; padding-left: 10px;">Player</th>
                                <th>Team Pts</th>
                                <th>Pick Pts</th>
                                <th>Pred Pts</th>
                                <th class="sortable" onclick="sortGrandTable()">Total <span>⇅</span></th>
                            </tr>
                        </thead>
                        <tbody id="grand-leaderboard-body"></tbody>
                    </table>
                </div>
            </div>

            </div>
            <div id="today-section" class="tab-content">
                <div id="sidebar-today" class="predictions-panel"></div>
            </div>
            <div id="predictions-section" class="tab-content">
                <div id="sidebar-predictions" class="predictions-panel"></div>
            </div>
            <div id="bracket-section" class="tab-content">
                <div id="bracket-container" class="bracket-wrap"></div>
            </div>
        </article>
        <script>
        (function() {
            var t = localStorage.getItem('wc_active_tab');
            if (t && document.getElementById(t + '-section')) {
                document.querySelectorAll('.tab-content').forEach(function(el) { el.classList.remove('active'); });
                document.querySelectorAll('.tab-btn').forEach(function(el) { el.classList.remove('active'); });
                document.getElementById(t + '-section').classList.add('active');
                var b = document.querySelector('.tab-btn[onclick*="\'' + t + '\'"]');
                if (b) b.classList.add('active');
            }
        })();
        </script>
        <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
        <script src="jscodes.js?v=13"></script>
        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
            }
        </script>
    </div>
</body>
</html>
