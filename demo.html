// ─── RENDER: LIVE MATCH BAR ───────────────────────────────────────────────────

function renderLiveBar() {
    const c = document.getElementById('live-matches-list');
    [SF1, SF2].forEach(m => {
        const isLive = m.status === 'IN_PLAY';
        const hs = m.score.home !== null ? m.score.home : '-';
        const as = m.score.away !== null ? m.score.away : '-';
        const statusText = isLive ? `LIVE ${m.minute}'` : `${m.kickoffLocal} local (TRT: ${m.kickoffTRT})`;
        c.innerHTML += `
        <div class="match-card${isLive ? ' is-live' : ''}">
            <div class="match-team-row">
                <div class="match-team-info"><img src="${flag(m.home)}" class="match-team-logo" alt="${m.home}"><span>${m.home}</span></div>
                <span class="match-score">${hs}</span>
            </div>
            <div class="match-team-row">
                <div class="match-team-info"><img src="${flag(m.away)}" class="match-team-logo" alt="${m.away}"><span>${m.away}</span></div>
                <span class="match-score">${as}</span>
            </div>
            <div class="match-status${isLive ? ' live' : ''}">${statusText} <span class="sep">•</span> ${m.stage}</div>
        </div>`;
    });
}

// ─── RENDER: SCOREBOARD TABLE ─────────────────────────────────────────────────

function renderScoreboard() {
    const tbody = document.getElementById('scoreboard-body');
    STANDINGS.forEach((row, i) => {
        const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
        const formHtml = row.form.map(f => {
            const label = f === '-' ? '-' : f.toUpperCase();
            const cls = f === '-' ? 'empty' : f;
            return `<span class="form-badge ${cls}">${label}</span>`;
        }).join('');
        const tr = document.createElement('tr');
        tr.className = rankClass;
        tr.innerHTML = `
            <td>
                <div class="scoreboard-team">
                    <span class="scoreboard-team-logo"><img src="${flag(row.team)}" alt="${row.team}"></span>
                    <div class="team-info">
                        <span class="team-name">${row.team}</span>
                        <span class="player-name">${row.player}</span>
                    </div>
                </div>
            </td>
            <td class="stat-col">${row.w}</td>
            <td class="stat-col">${row.d}</td>
            <td class="stat-col">${row.l}</td>
            <td class="points-col" style="color:var(--text-main); font-size:1.1rem;">${row.pts}</td>
            <td><div class="formData">${formHtml}</div></td>
        `;
        tbody.appendChild(tr);
    });
}

// ─── RENDER: SCORE PREDICTIONS TABLE ─────────────────────────────────────────

function renderPredLeaderboard() {
    const tbody = document.getElementById('pred-leaderboard-body');
    PRED_STATS.forEach(row => {
        const exactP  = row.total ? +(row.exact   / row.total * 100).toFixed(0) : 0;
        const partialP = row.total ? +(row.partial / row.total * 100).toFixed(0) : 0;
        const missedP  = Math.max(0, 100 - exactP - partialP);
        const ptr = document.createElement('tr');
        ptr.innerHTML = `
            <td style="text-align:left; padding-left:10px;">
                <span class="player-name" style="font-size:0.9rem; color:var(--text-main); font-weight:600;">${row.player}</span>
            </td>
            <td class="points-col" style="color:#a78bfa;">${row.pts}</td>
            <td class="perc-col" style="text-align:left;">
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px; white-space:nowrap;">
                    <span style="font-weight:800; font-size:0.8rem; color:var(--accent);">${row.rate}%</span>
                    <span style="color:var(--win); font-size:0.7rem;">✓ ${row.exact}</span>
                    <span style="color:var(--text-muted); font-size:0.7rem;">△ ${row.partial}</span>
                </div>
                <div class="perc-container">
                    <div class="perc-bar" style="background:var(--win); width:${exactP}%"></div>
                    <div class="perc-bar" style="background:#fbbf24; width:${partialP}%"></div>
                    <div class="perc-bar" style="background:rgba(255,255,255,0.05); width:${missedP}%"></div>
                </div>
            </td>
        `;
        tbody.appendChild(ptr);
    });
}

                <span class="player-name" style="font-size:0.9rem; color:var(--text-main); font-weight:600;">${row.player}</span>
            </td>
            <td class="points-col" style="color:var(--text-main);">${row.teamPts}</td>
            <td class="points-col" style="color:#34d399;">${row.pickPts}</td>
            <td class="points-col" style="color:#a78bfa;">${row.predPts}</td>
            <td class="points-col"><div class="points-badge">${row.total}</div></td>
        `;
        tbody.appendChild(gtr);
    });
}

// ─── RENDER: PICKS PANEL (shared for Today & All Picks) ───────────────────────

function pickColor(pred, match) {
    if (!pred.pick || match.status === 'SCHEDULED') return 'var(--text-muted)';
    const pickedHome = pred.pick === match.home;
    const hs = match.score.home, as = match.score.away;
    if (hs === null) return 'var(--text-muted)';
    const winning = (pickedHome && hs > as) || (!pickedHome && as > hs);
    const drawing = hs === as;
    return (winning || drawing) ? '#34d399' : '#f87171';
}

function scoreColor(pred, match) {
    if ((pred.h === '' && pred.a === '') || match.status === 'SCHEDULED') return 'var(--text-muted)';
    const hs = match.score.home, as = match.score.away;
    if (hs === null) return 'var(--text-muted)';
    const gH = parseInt(pred.h) === hs;
    const gA = parseInt(pred.a) === as;
    if (gH && gA) return '#34d399';
    if (gH || gA) return '#fbbf24';
    return '#f87171';
}

function scorePts(pred, match) {
    if (match.status !== 'FINISHED') return null;
    const hs = match.score.home, as = match.score.away;
    if (hs === null) return null;
    if (pred.h === '' && pred.a === '') return null;
    const gH = parseInt(pred.h) === hs, gA = parseInt(pred.a) === as;
    if (gH && gA) return '+10';
    if (gH || gA) return '+5';
    return '+0';
}

function buildMatchCard(match, isToday) {
    const isLive     = match.status === 'IN_PLAY' || match.status === 'PAUSED';
    const isFinished = match.status === 'FINISHED';
    const hasScore   = match.score.home !== null;
    const hs = hasScore ? match.score.home : null;
    const as = hasScore ? match.score.away : null;

    const vsHtml = isLive || isFinished
        ? `<span style="color:var(--win); font-weight:900; margin:0 5px;">${hs} - ${as}</span>`
        : '<span style="margin:0 5px;">vs</span>';

    const timeInfo = match.kickoffLocal
        ? `Local: ${match.kickoffLocal} • TRT: ${match.kickoffTRT} • ${match.stage}${isLive ? ` • LIVE ${match.minute}'` : ''}`
        : `${match.stage}${isFinished ? ' • FT' : ''}`;

    const summaryRows = PLAYERS.map(p => {
        const pred = ALL_PREDS[p][match.id] || { pick: '', h: '', a: '' };
        const pc = pickColor(pred, match);
        const sc = scoreColor(pred, match);
        const pts = scorePts(pred, match);
        const scoreLabel = pred.h !== '' ? `${pred.h}–${pred.a}` : '–';
        const ptsTag = pts
            ? `<span style="color:${pts === '+0' ? '#f87171' : '#a78bfa'}; font-size:0.65rem; margin-left:3px;">${pts}</span>`
            : '';
        return `<div class="summary-row">
            <span class="summary-name">${p}</span>
            <span class="summary-pick" style="color:${pc};">${pred.pick || '–'}</span>
            <span class="summary-score" style="color:${sc}; font-weight:700;">${scoreLabel}${ptsTag}</span>
        </div>`;
    }).join('');

    // Ahmet's own input (verified user)
    const myPred = ALL_PREDS['Ahmet'][match.id] || { pick:'', h:'', a:'' };
    const locked = isLive || isFinished;

    let pickPtsTag = '', predPtsTag = '';
    if (isFinished && hasScore) {
        const pickedHome = myPred.pick === match.home;
        let pp = 0;
        if (myPred.pick) { if ((pickedHome && hs > as) || (!pickedHome && as > hs)) pp = 3; else if (hs === as) pp = 1; }
        pickPtsTag = pp > 0
            ? `<span style="color:#34d399; font-size:0.72rem; margin-left:4px;">+${pp}</span>`
            : myPred.pick ? `<span style="color:#f87171; font-size:0.72rem; margin-left:4px;">+0</span>` : '';
        const sp = scorePts(myPred, match);
        if (sp) predPtsTag = `<span style="color:${sp === '+0' ? '#f87171' : '#a78bfa'}; font-size:0.72rem; margin-left:4px;">${sp}</span>`;
    }

    const saveBtn = !locked ? `<button class="save-pred-btn" style="width:100%; margin-top:4px;">Save</button>` : '';

    const inputPanel = `<div class="user-input-panel">
        <div style="display:flex; flex-direction:column; gap:5px;">
            <div style="display:flex; align-items:center; gap:4px;">
                <span style="font-size:0.65rem; color:var(--text-muted); white-space:nowrap;">Pick${pickPtsTag}</span>
                <select class="pred-select" ${locked ? 'disabled' : ''} style="flex:1;">
                    <option value="">-- Pick --</option>
                    <option value="${match.home}" ${myPred.pick === match.home ? 'selected' : ''}>${match.home}</option>
                    <option value="${match.away}" ${myPred.pick === match.away ? 'selected' : ''}>${match.away}</option>
                </select>
            </div>
            <div style="display:flex; align-items:center; gap:4px;">
                <span style="font-size:0.65rem; color:var(--text-muted); white-space:nowrap;">Score${predPtsTag}</span>
                <input type="number" class="pred-input-small" value="${myPred.h}" placeholder="H" ${locked ? 'disabled' : ''}>
                <span style="color:var(--text-muted); font-size:0.8rem;">–</span>
                <input type="number" class="pred-input-small" value="${myPred.a}" placeholder="A" ${locked ? 'disabled' : ''}>
            </div>
            ${saveBtn}
        </div>
    </div>`;

    const card = document.createElement('div');
    card.className = 'sidebar-match-card';
    card.innerHTML = `
        <div class="sidebar-match-header">
            <img src="${flag(match.home)}" style="width:16px; border-radius:50%; vertical-align:middle;">
            ${match.home} ${vsHtml} ${match.away}
            <img src="${flag(match.away)}" style="width:16px; border-radius:50%; vertical-align:middle;">
            <br><small style="color:var(--text-muted); font-size:0.8rem; font-weight:normal;">${timeInfo}</small>
        </div>
        <div class="card-body-split">
            ${inputPanel}
            <div class="picks-summary-box">
                <div class="picks-summary-header">Everyone's Picks</div>
                ${summaryRows}
            </div>
        </div>
    `;
    return card;
}

// ─── RENDER: TODAY TAB ────────────────────────────────────────────────────────

function renderToday() {
    const c = document.getElementById('sidebar-today');
    c.innerHTML = `<h2 style="margin-bottom:20px; text-align:center;">Today's Picks</h2>`;
    const h = document.createElement('h3');
    h.className = 'phase-header';
    h.textContent = todayStr;
    c.appendChild(h);
    [SF1, SF2].forEach(m => c.appendChild(buildMatchCard(m, true)));
}

// ─── RENDER: ALL PICKS TAB ────────────────────────────────────────────────────

function renderAllPicks() {
    const c = document.getElementById('sidebar-predictions');
    c.innerHTML = `<h2 style="margin-bottom:20px; text-align:center;">Schedule</h2>`;

    let lastDay = '';
    PAST_MATCHES.forEach(m => {
        if (m.dateStr !== lastDay) {
            lastDay = m.dateStr;
            const h = document.createElement('h3');
            h.className = 'phase-header';
            h.textContent = m.dateStr;
            c.appendChild(h);
        }
        c.appendChild(buildMatchCard(m, false));
    });
}

// ─── RENDER: BRACKET TAB ─────────────────────────────────────────────────────

function renderBracket() {
    const c = document.getElementById('bracket-container');
    const groups = {
        'A': ['France','Mexico','Senegal','Ecuador'],
        'B': ['Brazil','Canada','Japan','Switzerland'],
        'C': ['Argentina','Croatia','England','Ghana'],
        'D': ['Spain','USA','Cameroon','Serbia'],
        'E': ['Germany','Uruguay','South Korea','Morocco'],
        'F': ['Portugal','Netherlands','Senegal','Serbia'],
    };

    let groupsHtml = '<div class="bracket-section-label">Group Stage</div><div class="bracket-groups-grid">';
    Object.entries(groups).forEach(([g, teams]) => {
        groupsHtml += `<div class="bracket-group-card">
            <div class="bracket-group-header">Group ${g}</div>
            ${teams.map(t => `<div class="bracket-group-team"><img src="${flag(t)}" class="bracket-flag" alt="${t}"><span>${t}</span></div>`).join('')}
        </div>`;
    });
    groupsHtml += '</div>';

    const stages = [
        { label: 'Round of 16', matches: [
            {home:'France',away:'South Korea',hs:3,as:0,done:true},
            {home:'Netherlands',away:'Germany',hs:2,as:3,done:true},
            {home:'Brazil',away:'Serbia',hs:2,as:0,done:true},
            {home:'England',away:'Argentina',hs:1,as:2,done:true}, // Wait - this is wrong
            {home:'Argentina',away:'Switzerland',hs:2,as:1,done:true},
            {home:'Croatia',away:'Spain',hs:0,as:1,done:true},
            {home:'Japan',away:'Spain',hs:0,as:1,done:true},
            {home:'Morocco',away:'Portugal',hs:2,as:1,done:true},
        ]},
        { label: 'Quarter-finals', matches: [
            {home:'France',away:'Netherlands',hs:2,as:1,done:true},
            {home:'Germany',away:'Brazil',hs:2,as:3,done:true},
            {home:'Argentina',away:'Spain',hs:2,as:1,done:true}, // wait Argentina vs QF opponent
            {home:'Spain',away:'Morocco',hs:2,as:0,done:true},
        ]},
        { label: 'Semi-finals', matches: [
            {home:'France',away:'Brazil',hs:2,as:1,done:false,live:true},
            {home:'Argentina',away:'Spain',hs:null,as:null,done:false},
        ]},
        { label: 'Final', matches: [
            {home:'TBD',away:'TBD',hs:null,as:null,done:false},
        ]},
    ];

    let bracketHtml = '<div class="bracket-scroll">';
    stages.forEach((stage, si) => {
        const isFinal = stage.label === 'Final';
        bracketHtml += `<div class="bracket-col${isFinal ? ' bracket-col-final' : ''}">
            <div class="bracket-col-header">${stage.label}</div>
            <div class="bracket-col-matches">`;

        const matches = stage.matches;
        for (let i = 0; i < matches.length; i += (isFinal ? 1 : 2)) {
            bracketHtml += '<div class="bracket-pair">';
            for (let j = i; j < Math.min(i + (isFinal ? 1 : 2), matches.length); j++) {
                const m = matches[j];
                const isTbd = m.home === 'TBD' && m.away === 'TBD';
                bracketHtml += `<div class="bracket-match${m.live ? ' is-live' : ''}${isTbd ? ' bracket-tbd' : ''}">
                    <div class="bracket-team${m.done && m.hs > m.as ? ' winner' : m.done ? ' loser' : ''}">
                        <img src="${flag(m.home)}" class="bracket-flag" alt="${m.home}">
                        <span class="bracket-name">${m.home}</span>
                        ${m.hs !== null ? `<span class="bracket-score">${m.hs}</span>` : ''}
                    </div>
                    <div class="bracket-team${m.done && m.as > m.hs ? ' winner' : m.done ? ' loser' : ''}">
                        <img src="${flag(m.away)}" class="bracket-flag" alt="${m.away}">
                        <span class="bracket-name">${m.away}</span>
                        ${m.as !== null ? `<span class="bracket-score">${m.as}</span>` : ''}
                    </div>
                    <div class="bracket-match-info">${m.live ? "LIVE 62'" : m.done ? 'FT' : 'Semi-final Day'}</div>
                </div>`;
            }
            bracketHtml += '</div>';
        }

        bracketHtml += '</div></div>';
    });
    bracketHtml += '</div>';

    c.innerHTML = groupsHtml + '<div class="bracket-section-label" style="margin-top:24px;">Knockout Stage</div>' + bracketHtml;
}
