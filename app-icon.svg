<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2840"/>
    </linearGradient>
    <linearGradient id="gh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="gv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="44%" r="48%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="10" flood-color="#38bdf8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="256" cy="210" r="210" fill="url(#glow)"/>

  <!-- Trophy cup body -->
  <path d="M 144,68 L 368,68 L 324,234 Q 256,274 188,234 Z"
        fill="url(#gh)" filter="url(#shadow)"/>

  <!-- Left handle -->
  <path d="M 150,92 C 82,92 74,230 190,244"
        fill="none" stroke="url(#gh)" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right handle -->
  <path d="M 362,92 C 430,92 438,230 322,244"
        fill="none" stroke="url(#gh)" stroke-width="22"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Stem -->
  <rect x="230" y="274" width="52" height="70" rx="5" fill="url(#gv)"/>

  <!-- Base (two pieces) -->
  <rect x="180" y="344" width="152" height="22" rx="7" fill="url(#gh)"/>
  <rect x="150" y="366" width="212" height="30" rx="10" fill="url(#gh)"/>

  <!-- "WC" inside cup -->
  <text x="256" y="158"
    font-family="'Arial Black',Arial,Helvetica,sans-serif"
    font-size="64" font-weight="900" text-anchor="middle"
    fill="rgba(255,255,255,0.92)" letter-spacing="2">WC</text>

  <!-- "2026" inside cup -->
  <text x="256" y="228"
    font-family="'Arial Black',Arial,Helvetica,sans-serif"
    font-size="52" font-weight="900" text-anchor="middle"
    fill="rgba(255,255,255,0.80)" letter-spacing="3">2026</text>

  <!-- Divider line -->
  <rect x="60" y="416" width="392" height="2.5" rx="1.25" fill="url(#gh)" opacity="0.75"/>

  <!-- App label -->
  <text x="256" y="462"
    font-family="'Arial Black',Arial,Helvetica,sans-serif"
    font-size="37" font-weight="900" text-anchor="middle"
    fill="url(#gh)" letter-spacing="3">SCOREBOARD</text>

  <!-- Host nations -->
  <text x="256" y="493"
    font-family="Arial,Helvetica,sans-serif"
    font-size="17" font-weight="600" text-anchor="middle"
    fill="#3d5a7a" letter-spacing="2">USA · CAN · MEX</text>
</svg>
